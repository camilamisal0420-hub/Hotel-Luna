<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Hotel Luna</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Lato&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; min-height: 100vh; font-family: 'Lato', sans-serif; background: #f7f5f0; }
        .sidebar { width: 260px; background: #1e3a5f; color: #fff; padding: 2rem 1rem; display: flex; flex-direction: column; }
        .sidebar .logo { font-family: 'Poppins', sans-serif; font-size: 1.5rem; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; }
        .sidebar .logo i { color: #c9a96e; font-size: 2rem; }
        .sidebar nav a { color: #d0d9e4; text-decoration: none; padding: 12px 15px; border-radius: 8px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 500; transition: background 0.2s, color 0.2s; }
        .sidebar nav a i { width: 20px; text-align: center; }
        .sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,0.15); color: #fff; }
        .sidebar .logout-link { color: #d0d9e4; text-decoration: none; padding: 12px 15px; border-radius: 8px; display: flex; align-items: center; gap: 12px; margin-top: auto; font-weight: 500; transition: background 0.2s, color 0.2s; }
        .sidebar .logout-link:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .main-content { flex: 1; padding: 2.5rem 3rem; }
        .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 500px; margin: 0 auto; }
        h2 { font-family: 'Poppins', sans-serif; color: #1e3a5f; margin-bottom: 1.5rem; }
        .input-field { margin-bottom: 1.2rem; }
        .input-field label { display: block; font-weight: 600; margin-bottom: 6px; }
        .input-field input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 1rem; background: #faf9f7; }
        .btn-primary { background: #1e3a5f; color: #fff; padding: 12px 25px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 1rem; }
        .alert-error { background: #fdecea; color: #c0392b; border-left: 4px solid #e74c3c; }
        .alert-success { background: #e8f6ef; color: #1e8449; border-left: 4px solid #27ae60; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-hotel"></i> Hotel Luna</div>
        <nav>
            <a href="{{ url_for('dashboard') }}"><i class="fas fa-calendar-plus"></i> New Reservation</a>
            <a href="{{ url_for('my_bookings') }}"><i class="fas fa-list"></i> My Bookings</a>
            <a href="{{ url_for('profile') }}" class="active"><i class="fas fa-user-circle"></i> Profile</a>
        </nav>
        <a href="{{ url_for('logout') }}" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="main-content">
        <h2 style="text-align:center; margin-bottom:2rem;">My Profile</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div class="card">
            <form action="{{ url_for('update_profile') }}" method="POST">
                <div class="input-field">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{{ user.full_name }}" required>
                </div>
                <div class="input-field">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ user.email }}" required>
                </div>
                <div class="input-field">
                    <label>Current Password</label>
                    <input type="password" name="current_password" required>
                </div>
                <div class="input-field">
                    <label>New Password (leave blank to keep current)</label>
                    <input type="password" name="new_password">
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Update Profile</button>
            </form>
        </div>
    </div>
</body>
</html>
