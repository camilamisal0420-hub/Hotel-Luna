<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Hotel Luna</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Lato&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #f7f5f0 0%, #e8e0d5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 3rem 2.5rem;
            width: 420px;
            max-width: 90%;
            text-align: center;
        }
        .auth-card .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
        }
        .auth-card .logo i {
            color: #c9a96e;
            margin-right: 8px;
        }
        .auth-card h2 {
            font-family: 'Poppins', sans-serif;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.8rem;
            text-align: left;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.3s, box-shadow 0.3s;
            background-color: #faf9f7;
        }
        .input-group input:focus {
            outline: none;
            border-color: #c9a96e;
            box-shadow: 0 0 0 3px rgba(201,169,110,0.2);
        }
        .input-group input:focus ~ i {
            color: #c9a96e;
        }
        .btn {
            background: #1e3a5f;
            color: #fff;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-family: 'Poppins', sans-serif;
        }
        .btn:hover {
            background: #2a5080;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .switch-link {
            margin-top: 1.5rem;
            color: #1e3a5f;
            font-size: 0.95rem;
        }
        .switch-link a {
            color: #c9a96e;
            text-decoration: none;
            font-weight: 600;
        }
        .switch-link a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: left;
        }
        .alert-error {
            background: #fdecea;
            color: #c0392b;
            border-left: 4px solid #e74c3c;
        }
        .alert-success {
            background: #e8f6ef;
            color: #1e8449;
            border-left: 4px solid #27ae60;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <i class="fas fa-hotel"></i>Hotel Luna
        </div>
        <h2>Welcome Back</h2>

        <!-- Flash messages from Flask -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email address" required autocomplete="email">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign In <i class="fas fa-arrow-right"></i></button>
        </form>
        <p class="switch-link">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </div>
</body>
</html>
